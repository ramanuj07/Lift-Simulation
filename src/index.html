<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/main.js" defer></script>
    <title>Lift Simulation</title>
  </head>
  <body>
    <div class="lift--simulation__form--field">
      <div id="app--heading">
        <h1>Lift Simulator</h1>
      </div>

      <form id="form--container">
        <div>
          <label for="floor--field">Floors</label>
          <input
            type="text"
            name="floors"
            placeholder="Enter no. of floors"
            id="floor--field"
          />
        </div>

        <div>
          <label for="lift--field">Lifts</label>
          <input
            type="text"
            name="lifts"
            placeholder="Enter no. of lifts"
            id="lift--field"
          />
        </div>

        <button id="submit--btn" type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
